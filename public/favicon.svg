<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#2a1a0a"/>

  <!-- JB text -->
  <text
    x="16"
    y="10"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="Georgia, serif"
    font-weight="700"
    font-size="8"
    fill="#e8ddd0"
    letter-spacing="1"
  >JB</text>

  <!-- Laptop screen -->
  <rect x="7" y="14" width="18" height="11" rx="1.5" fill="none" stroke="#c4522a" stroke-width="1.5"/>
  <!-- Screen inner (glow) -->
  <rect x="9" y="16" width="14" height="7" rx="0.5" fill="#3d2510"/>
  <!-- Code lines on screen -->
  <line x1="10.5" y1="18" x2="16" y2="18" stroke="#4a7c59" stroke-width="1" stroke-linecap="round"/>
  <line x1="10.5" y1="20" x2="14" y2="20" stroke="#c4956a" stroke-width="1" stroke-linecap="round"/>
  <line x1="10.5" y1="22" x2="17" y2="22" stroke="#4a7c59" stroke-width="1" stroke-linecap="round"/>
  <!-- Laptop base -->
  <rect x="5" y="25" width="22" height="2" rx="1" fill="#c4522a"/>
</svg>
